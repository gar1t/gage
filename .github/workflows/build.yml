name: Build

# Compile and package platform artifacts, keyed to the commit that produced
# them. These artifacts are durable workflow artifacts; the Release workflow
# locates and publishes them later by matching the commit SHA, so a release
# never rebuilds.
#
# Adding a platform = adding a row to the matrix. The steps are generic.

on:
  push:
    # Building is opt-in: a commit is built only when pushed to the build
    # branch. Nothing builds automatically on main.
    branches:
      - build

permissions:
  contents: read

env:
  BIN: gage

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read version
        id: version
        shell: bash
        run: |
          # The first top-level `version =` in Cargo.toml is the workspace
          # version that every crate inherits. It names the artifact and keys
          # the build cache, so a green build for a version is reused, never
          # recompiled. Indented `version =` lines under other tables don't
          # match the `^version` anchor.
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          [ -n "$version" ] || { echo "could not read crate version" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore build cache
        id: cache
        uses: actions/cache@v4
        with:
          # Key on version + target. A successful build saves the binary under
          # this key at job end; an immutable hit on a later run skips the
          # compile entirely. A failed build never populates the cache, so a
          # previously-failed target rebuilds while green targets are reused.
          # Bump the version to force a full rebuild.
          key: build-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BIN }}

      - name: Install Rust
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: cargo build --release --target ${{ matrix.target }} --bin "$BIN"

      - name: Package
        id: package
        shell: bash
        run: |
          # Source the binary from cache-or-build; this runs every time so each
          # build run emits a complete artifact set for the release workflow.
          version="${{ steps.version.outputs.version }}"
          archive="${BIN}-${version}-${{ matrix.target }}.tar.gz"

          staging="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/${BIN}" "$staging/"
          tar -C "$staging" -czf "$archive" "$BIN"

          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
