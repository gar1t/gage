# Compile Gage for each target in the matrix and upload the resulting
# tar.gz as an artifact named ${PKGNAME}-${version}-${target}. Hard
# idempotent on (version, target): if an artifact with that name already
# exists anywhere in the repo, the row exits without building. To force
# a rebuild, delete the existing artifact first.

name: Build

on:
  push:
    # Building is opt-in: a commit is built only when pushed to the
    # build branch. Nothing builds automatically on main.
    branches:
      - build

permissions:
  contents: read
  actions: read # probe prior runs' artifacts for hard idempotency

env:
  PKGNAME: gage
  BIN: gage

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # target is the value used by cargo --target and corresponds
          # to the release triple arch-vendor-os[-env]
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Crate version
        id: version
        uses: ./.github/actions/crate-version

      - name: Previous artifact
        # Set a flag if a previous job succeeded with an uploaded
        # artifact. Sets `exists` output to yes or no.
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME:
            ${{ env.PKGNAME }}-${{ steps.version.outputs.version }}-${{
            matrix.target }}
        run: |
          count="$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/artifacts?name=$NAME" \
            --jq '.total_count')"
          if [ "$count" -gt 0 ]; then
            echo "$NAME already exists; skipping." >&2
            echo "exists=yes" >> "$GITHUB_OUTPUT"
          else
            echo "exists=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache
        if: steps.artifact.outputs.exists != 'yes'
        id: cache
        uses: actions/cache@v5
        with:
          key: build-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BIN }}

      - name: Rust
        if:
          steps.artifact.outputs.exists != 'yes' &&
          steps.cache.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build
        if:
          steps.artifact.outputs.exists != 'yes' &&
          steps.cache.outputs.cache-hit != 'true'
        run: cargo build --release --target ${{ matrix.target }} --bin "$BIN"

      - name: Package
        if: steps.artifact.outputs.exists != 'yes'
        id: package
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          archive="${PKGNAME}-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" "$BIN"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Artifact
        if: steps.artifact.outputs.exists != 'yes'
        uses: actions/upload-artifact@v7
        with:
          name:
            ${{ env.PKGNAME }}-${{ steps.version.outputs.version }}-${{
            matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
