name: Release

# Publish an already-built commit as a release ("release in retrospect").
# Triggered by pushing a version tag at a commit that has a successful Build
# run. This does NOT build: it gathers that build's artifacts and publishes
# them under the tag.
#
# Process: push a commit to the build branch, watch Build go green, then tag
# that commit and push the tag. The tag marks a commit already proven to build.
#
# Re-running after a transient failure: `gh run rerun <id> --failed`. No
# rebuild — the build artifacts are reused.

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write   # create the release
  actions: read     # list and download build artifacts

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Locate build run for this commit
        id: build
        run: |
          # GITHUB_SHA is the commit the tag points at; it must have been built
          # (pushed to the build branch) already.
          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build.yml \
            --status success \
            --limit 100 \
            --json databaseId,headSha \
            --jq "map(select(.headSha==\"$GITHUB_SHA\")) | .[0].databaseId")"

          if [ -z "$run_id" ]; then
            echo "::error::No successful Build run for $GITHUB_SHA." \
                 "Push this commit to the build branch, let Build finish, then tag it." >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download built artifacts
        run: |
          gh run download "${{ steps.build.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'artifact-*' \
            --dir downloaded

          # gh nests each artifact in its own directory; flatten to dist/.
          mkdir -p dist
          find downloaded -type f -exec mv -t dist {} +

      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create release
        run: |
          # The tag is the release version; a semver prerelease carries a
          # suffix (e.g. 0.0.1-pre.1).
          case "$GITHUB_REF_NAME" in
            *-*) prerelease=--prerelease ;;
            *)   prerelease= ;;
          esac

          gh release create "$GITHUB_REF_NAME" \
            --target "$GITHUB_SHA" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $prerelease \
            dist/*
