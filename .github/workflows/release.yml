# Create a release with available built artifacts for the current crate
# version.
#
# Artifacts are generated from build.yml (pushes to build branch). Once
# all build targets are successfully uploaded, a push to the release
# branch signals that Gage is ready for a release.
#
# Releases are keyed by crate version.
#
# New releases include release notes from CHANGELOG.md under the section
# header `[{version}]`.

name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write
  actions: read

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PKGNAME: gage

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read crate version
        id: version
        uses: ./.github/actions/read-version

      - name: Artifacts
        # Find every artifact named ${PKGNAME}-${VERSION}-* across the
        # repo (regardless of which Build run produced it) and extract
        # the tarball from each into dist/. If a name appears in more
        # than one run, the highest id (most recent) wins.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          prefix="${PKGNAME}-${VERSION}-"
          selected="$(mktemp)"
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
            | jq -s "[.[].artifacts[] | select(.name | startswith(\"$prefix\"))] | group_by(.name) | map(max_by(.id))" \
            > "$selected"
          count="$(jq 'length' "$selected")"
          if [ "$count" -eq 0 ]; then
            echo "::error::No artifacts for ${PKGNAME}-${VERSION}" >&2
            exit 1
          fi
          mkdir -p dist
          jq -r '.[] | "\(.id)\t\(.name)"' "$selected" | while IFS=$'\t' read -r id name; do
            zip="$(mktemp --suffix=.zip)"
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$id/zip" > "$zip"
            unzip -j -o "$zip" -d dist/
            rm -f "$zip"
          done

      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Release notes
        # Release body is the CHANGELOG.md section for the release
        # version. Content consists of the lines between the `##
        # ...VERSION...` heading and the next `## ` heading.
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          notes_file="$(mktemp)"
          awk -v ver="$VERSION" '
            /^## / {
              if (in_section) exit
              if (index($0, ver) > 0) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > "$notes_file"
          # Trim leading/trailing blank lines; fail if nothing was captured.
          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "::error::No CHANGELOG.md section found for $VERSION." \
                 "Add a '## [$VERSION]' heading with notes before releasing." >&2
            exit 1
          fi
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          # A semver prerelease carries a suffix (e.g. 0.0.1-pre.2).
          case "$VERSION" in
            *-*) prerelease=--prerelease ;;
            *)   prerelease= ;;
          esac
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "$NOTES_FILE" \
            $prerelease \
            dist/*
